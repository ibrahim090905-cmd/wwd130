<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ICE Signup</title>

<style>
* {
    margin: 0;
    box-sizing: border-box;
}

body {
    background: rgb(120, 96, 64);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: Arial, sans-serif;
}

#banner {
    width: 100%;
    height: auto;
    object-fit:cover;
}

#formContainer {
    background: white;
    width: 550px;
    border: 10px solid blue;
    border-radius: 30px;
    overflow: hidden;
    position: relative;
}

h3 {
    text-align: center;
    padding: 20px;
}


form {
    display: grid;
    grid-template-columns: 150px 1fr;
    gap: 10px;
    padding: 30px;
}

input[type="text"],
input[type="password"],
input[type="email"] {
    width: 100%;
    padding: 5px;
}

/* full-width rows */
section {
    grid-column: 1 / 3;
    text-align: center;
}

/* close button */
#closeBtn {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 35px;
    height: 35px;
    cursor: pointer;
}

/* submit button */
button[type="submit"] {
    padding: 10px 20px;
    font-size: 1rem;
}

/* books grid (optional ICE feature) */
#books {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
}

#books img {
    width: 100%;
    display: block;
}
</style>
</head>

<body>

<div id="formContainer">

    <button id="closeBtn">X</button>

<img src="images/jesus_feeds_5000.jpeg" alt="Daily Feed" id="banner">

    <h3>Signup up for Daily Scripture Feed!</h3>

    <!-- FIX #1: form needs ID for JavaScript -->
    <form id="myForm">
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" required>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>

        <label>Gender:</label>
        <div>
            <input type="radio" id="male" name="gender" value="male" required>
            <label for="male">Male</label>

            <input type="radio" id="female" name="gender" value="female" required>
            <label for="female">Female</label>
        </div>

        <section>
            <input type="checkbox" id="newsletter" name="newsletter">
            <label for="newsletter">Subscribe to newsletter</label>
        </section>

        <section>
            <input type="checkbox" id="conditions" name="conditions" required>
            <label for="conditions">I acknowledge the terms and conditions</label>
        </section>

        <section>
            <button type="submit">Submit</button>
        </section>

    </form>
    <div id="books">
        <img src="images/old_testament.jpg" alt="Old Testament">
        <img src="images/new_testament.jpg" alt="New Testament">
        <img src="images/book_of_mormon.jpg" alt="Book of Mormon">
        <img src="images/doctrine_and_covenants.jpg" alt="Doctrine and Covenants">
        <img src="images/pearl_of_great_price.jpg" alt="Pearl of Great Price">

    </div>
</div>

<div id="output"></div>

<script>
document.getElementById("closeBtn").addEventListener("click", function () {
    document.getElementById("formContainer").style.display = "none";
});

const form = document.getElementById('myForm');
const output = document.getElementById('output');

form.addEventListener('submit', function (event) {
    event.preventDefault();

    const formData = new FormData(form);
    const entries = [];

    for (const [key, value] of formData.entries()) {
        if (key === "password") {
            entries.push(`<strong>${key}</strong>: ${value} (you should probably encrypt the password)`);
        } else {
            entries.push(`<strong>${key}</strong>: ${value}`);
        }
    }

    output.innerHTML = `
        <br>
        <h3>Here is the data that would be sent to the server:</h3>
        <ul>
            ${entries.map(item => `<li>${item}</li>`).join('')}
        </ul>
    `;
});
</script>

</body>
</html>
